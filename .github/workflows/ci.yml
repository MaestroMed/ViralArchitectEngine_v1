name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: TypeScript + ESLint ────────────────────────────────────────
  typecheck-desktop:
    name: Desktop — TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: apps/desktop
        run: pnpm typecheck

  lint-desktop:
    name: Desktop — ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/desktop
        run: pnpm lint

  # ─── Web Review PWA ───────────────────────────────────────────────────────
  build-web-review:
    name: Web Review — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web-review
        run: pnpm build

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-review-dist
          path: apps/web-review/dist
          retention-days: 7

  # ─── Backend: Ruff lint ────────────────────────────────────────────────────
  lint-backend:
    name: Backend — Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        working-directory: apps/forge-engine
        run: ruff check src/

  # ─── Backend: Unit tests (no ML heavy deps) ───────────────────────────────
  test-backend:
    name: Backend — Tests
    runs-on: ubuntu-latest
    env:
      FORGE_LIBRARY_PATH: /tmp/forge-test-library
      FORGE_FORCE_CPU: "1"
      FORGE_WHISPER_MODEL: tiny
      FORGE_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/forge-engine/requirements-ci.txt

      - name: Install CI dependencies
        working-directory: apps/forge-engine
        run: pip install -r requirements-ci.txt

      - name: Install package (editable)
        working-directory: apps/forge-engine
        run: pip install -e . --no-deps

      - name: Run unit tests
        working-directory: apps/forge-engine
        run: |
          pytest tests/ \
            -m "not slow and not gpu and not e2e" \
            --ignore=tests/test_pipeline_e2e.py \
            --ignore=tests/test_export_real.py \
            -v \
            --tb=short \
            --cov=src/forge_engine \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/forge-engine/coverage.xml
          retention-days: 7
