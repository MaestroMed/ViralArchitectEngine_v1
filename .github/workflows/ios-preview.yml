name: iOS Preview Screenshots

# Builds the SwiftUI app for the iOS Simulator (no code signing needed for the
# simulator) and captures real screenshots of the three screens, uploaded as
# artifacts. This is how we "see the app in the simulator" without anyone
# touching Xcode — GitHub's macOS runner does it.
#
# Trigger manually (Actions tab → "iOS Preview Screenshots" → Run workflow),
# or it runs automatically when the iOS app changes on main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-preview.yml"

jobs:
  screenshots:
    name: Build + screenshot (Simulator)
    # macos-15's default Xcode is 16.x, which understands the project format
    # XcodeGen emits (objectVersion 77). Pinning Xcode 15.4 previously failed
    # with "future Xcode project file format (77)".
    runs-on: macos-15
    timeout-minutes: 30
    env:
      BUNDLE_ID: "com.maestromed.forgelab"
      APP_DIR: apps/ios

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.APP_DIR }}
        run: xcodegen

      - name: Build for Simulator (unsigned)
        working-directory: ${{ env.APP_DIR }}
        run: |
          xcodebuild \
            -project ForgeLab.xcodeproj \
            -scheme ForgeLab \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate built .app
        id: locate
        working-directory: ${{ env.APP_DIR }}
        run: |
          APP_PATH="$(find build/Build/Products -name 'ForgeLab.app' -type d | head -1)"
          if [ -z "$APP_PATH" ]; then echo "ForgeLab.app not found"; exit 1; fi
          echo "app_path=$APP_DIR/$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Built: $APP_PATH"

      - name: Boot a simulator
        id: sim
        run: |
          # Pick the first available modern iPhone simulator by UDID — names
          # vary between Xcode versions, UDIDs don't.
          UDID="$(xcrun simctl list devices available \
            | grep -E 'iPhone 1[5-9]( Pro)?( Max)? \(' \
            | head -1 \
            | grep -oE '[0-9A-Fa-f-]{36}')"
          if [ -z "$UDID" ]; then
            echo "No modern iPhone simulator available; falling back to any iPhone"
            UDID="$(xcrun simctl list devices available | grep -E 'iPhone .*\(' | head -1 | grep -oE '[0-9A-Fa-f-]{36}')"
          fi
          if [ -z "$UDID" ]; then echo "No iPhone simulator found"; exit 1; fi
          echo "Using simulator $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Install app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "${{ steps.locate.outputs.app_path }}"

      - name: Capture screenshots
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          mkdir -p screenshots
          shoot() {  # $1 = name, rest = launch args
            local name="$1"; shift
            xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
            xcrun simctl launch "$UDID" "$BUNDLE_ID" "$@"
            sleep 6
            xcrun simctl io "$UDID" screenshot "screenshots/$name.png"
            echo "captured $name.png"
          }
          shoot "1-settings"
          shoot "2-queue" --demo
          shoot "3-detail" --demo --demo-screen detail
          ls -la screenshots

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-screenshots
          path: screenshots/*.png
          retention-days: 30
