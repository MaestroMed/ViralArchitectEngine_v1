name: iOS Preview Screenshots

# Builds the SwiftUI app for the iOS Simulator (no signing needed), RUNS the
# unit + UI tests on a booted simulator (the UI tests actually drive the app),
# then captures screenshots + a short screen-recording of the demo flow.
# Everything is uploaded as artifacts. This is how we "see AND test the app in
# the simulator" without anyone touching Xcode — GitHub's macOS runner does it.
#
# Trigger manually (Actions tab → Run workflow) or on changes to the iOS app.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-preview.yml"

jobs:
  simulator:
    name: Build · Test · Capture (Simulator)
    runs-on: macos-15
    timeout-minutes: 40
    env:
      BUNDLE_ID: "com.maestromed.forgelab"
      APP_DIR: apps/ios

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.APP_DIR }}
        run: xcodegen

      - name: Resolve + boot a simulator
        id: sim
        run: |
          UDID="$(xcrun simctl list devices available \
            | grep -E 'iPhone 1[5-9]( Pro)?( Max)? \(' | head -1 \
            | grep -oE '[0-9A-Fa-f-]{36}')"
          if [ -z "$UDID" ]; then
            UDID="$(xcrun simctl list devices available | grep -E 'iPhone .*\(' | head -1 | grep -oE '[0-9A-Fa-f-]{36}')"
          fi
          if [ -z "$UDID" ]; then echo "No iPhone simulator found"; exit 1; fi
          echo "Using simulator $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit + UI tests (drives the app in the simulator)
        id: tests
        working-directory: ${{ env.APP_DIR }}
        run: |
          # xcodebuild can exit non-zero on CoreSimulator teardown noise even
          # when every test passed, so we judge success by the authoritative
          # "** TEST SUCCEEDED **" marker in the log, not the exit code. This
          # step always exits 0 so the screenshot/video steps still run; the
          # final gate fails the job if the marker is absent.
          set +e
          set -o pipefail
          xcodebuild test \
            -project ForgeLab.xcodeproj \
            -scheme ForgeLab \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            -resultBundlePath build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee build/test.log
          if grep -qF "** TEST SUCCEEDED **" build/test.log; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Tests passed (TEST SUCCEEDED marker present)."
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "Tests did NOT report TEST SUCCEEDED."
          fi
          exit 0

      - name: Locate built .app
        id: locate
        working-directory: ${{ env.APP_DIR }}
        run: |
          APP_PATH="$(find build/Build/Products -name 'ForgeLab.app' -type d | head -1)"
          if [ -z "$APP_PATH" ]; then echo "ForgeLab.app not found"; exit 1; fi
          echo "app_path=$APP_DIR/$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Install app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "${{ steps.locate.outputs.app_path }}"

      - name: Capture screenshots
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          mkdir -p artifacts
          shoot() {
            local name="$1"; shift
            xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
            xcrun simctl launch "$UDID" "$BUNDLE_ID" "$@"
            sleep 6
            xcrun simctl io "$UDID" screenshot "artifacts/$name.png"
          }
          shoot "1-settings"
          shoot "2-queue" --demo
          shoot "3-detail" --demo --demo-screen detail
          ls -la artifacts

      - name: Record demo video (queue → detail)
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
          xcrun simctl io "$UDID" recordVideo --codec h264 --force "artifacts/demo.mp4" &
          REC_PID=$!
          sleep 1
          xcrun simctl launch "$UDID" "$BUNDLE_ID" --demo;            sleep 5
          xcrun simctl terminate "$UDID" "$BUNDLE_ID";                sleep 1
          xcrun simctl launch "$UDID" "$BUNDLE_ID" --demo --demo-screen detail; sleep 5
          kill -INT "$REC_PID" 2>/dev/null || true
          wait "$REC_PID" 2>/dev/null || true
          ls -la artifacts

      - name: Zip xcresult (UI test trail)
        if: always()
        run: |
          mkdir -p artifacts
          RESULT="apps/ios/build/TestResults.xcresult"
          if [ -d "$RESULT" ]; then
            ( cd apps/ios/build && zip -qr "$GITHUB_WORKSPACE/artifacts/TestResults.xcresult.zip" TestResults.xcresult )
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-preview
          path: artifacts/*
          retention-days: 30

      - name: Reflect test result in job status
        if: steps.tests.outputs.result != 'success'
        run: |
          echo "::error::iOS tests failed (no '** TEST SUCCEEDED **' marker) — see the test step log + TestResults.xcresult artifact"
          exit 1
