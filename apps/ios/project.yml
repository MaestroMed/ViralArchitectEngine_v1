# XcodeGen spec for FORGE LAB iOS.
# Materialize with:
#     brew install xcodegen
#     cd apps/ios && xcodegen
# Then open ForgeLab.xcodeproj in Xcode and Cmd-R.

name: ForgeLab
options:
  bundleIdPrefix: com.maestromed.forgelab
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "$(FORGE_APPLE_TEAM_ID)"  # set in shell before xcodegen
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  ForgeLab:
    type: application
    platform: iOS
    sources:
      - ForgeLab
    resources:
      - ForgeLab/Resources
    info:
      path: ForgeLab/Info.plist
      properties:
        CFBundleDisplayName: FORGE LAB
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: >
          FORGE LAB enregistre les clips approuvés dans ta pellicule
          pour que tu puisses les poster directement sur TikTok.
        NSUserTrackingUsageDescription: >
          FORGE LAB n'utilise aucun tracker.
        # Allow plain-text http traffic to the LAN-bound engine only.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
    entitlements:
      path: ForgeLab/ForgeLab.entitlements
      properties:
        com.apple.developer.networking.HotspotConfiguration: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maestromed.forgelab
        INFOPLIST_KEY_NSHumanReadableCopyright: "© MaestroMed"

  ForgeLabTests:
    type: bundle.unit-test
    platform: iOS
    sources: [ForgeLabTests]
    dependencies:
      - target: ForgeLab
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ForgeLab.app/ForgeLab"

  ForgeLabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [ForgeLabUITests]
    dependencies:
      - target: ForgeLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maestromed.forgelab.uitests

schemes:
  ForgeLab:
    build:
      targets:
        ForgeLab: all
        ForgeLabTests: [test]
        ForgeLabUITests: [test]
    test:
      targets:
        - ForgeLabTests
        - ForgeLabUITests
      gatherCoverageData: false
